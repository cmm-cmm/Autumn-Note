<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutumnNote — Dev</title>
  <link rel="stylesheet" href="./dist/autumnnote.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    p  { margin: 0 0 20px; color: #6b7280; }
    #editor-wrapper { width: 100%; }
    #output {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>AutumnNote</h1>
  <p>A modern WYSIWYG editor — no jQuery required.</p>

  <div id="editor-wrapper">
    <textarea id="editor">
      <p>Hello, <strong>AutumnNote</strong>! ✨</p>
      <p>Start typing to edit this content.</p>
    </textarea>
  </div>

  <div>
    <strong>HTML Output:</strong>
    <div id="output"></div>
  </div>

  <script src="./dist/autumnnote.umd.js"></script>
  <script>
    const editor = AutumnNote.create('#editor', {
      placeholder: 'Start typing here…',
      height: 300,
      codeHighlight: true,
      onChange(html) {
        document.getElementById('output').textContent = html;
      },
    });

    window.editor = editor;
    document.getElementById('output').textContent = editor.getHTML();
  </script>
</body>
</html>
