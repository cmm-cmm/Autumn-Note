<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Page Not Found | AutumnNote</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to the AutumnNote homepage, docs, or playground." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://autumn.konexforge.com/404.html" />

  <link rel="icon" href="/image/favicon.ico" type="image/x-icon" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #faf9f7;
      color: #1c1917;
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* === Header (matches site-wide header) === */
    .site-header {
      background: #1c1917;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; color: #fff; }
    .brand img { width: 30px; height: 30px; border-radius: 7px; }
    .brand-name { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .header-nav { display: flex; gap: 2px; }
    .nav-link {
      color: #a8a29e; font-size: 14px; font-weight: 500;
      padding: 6px 12px; border-radius: 7px; transition: background .15s, color .15s;
    }
    .nav-link:hover { background: rgba(255,255,255,.08); color: #fff; }

    /* === Not-found content === */
    .not-found {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 80px 24px;
    }
    .nf-code {
      font-size: clamp(56px, 10vw, 96px); font-weight: 800;
      letter-spacing: -.03em; color: #e8751a; line-height: 1;
      margin-bottom: 12px;
    }
    .nf-title {
      font-size: clamp(20px, 3vw, 28px); font-weight: 700;
      margin-bottom: 12px; color: #1c1917;
    }
    .nf-sub {
      font-size: 15px; color: #57534e; max-width: 460px;
      margin: 0 auto 32px; line-height: 1.6;
    }
    .nf-links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 600; padding: 10px 22px; border-radius: 9px;
      cursor: pointer; transition: opacity .15s, transform .12s; border: none;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary { background: #e8751a; color: #fff; }
    .btn-secondary {
      background: #fff; color: #1c1917;
      border: 1px solid #e7e5e4;
    }

    /* === Footer (matches site-wide footer) === */
    .site-footer { background: #1c1917; color: #a8a29e; }
    .footer-inner {
      max-width: 1100px; margin: 0 auto; padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-copy { font-size: 13px; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 13px; color: #a8a29e; }
    .footer-links a:hover { color: #e7e5e4; }

    @media (max-width: 480px) {
      .header-nav .nav-link { padding: 6px 8px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="https://autumn.konexforge.com/" aria-label="AutumnNote home">
        <img src="/image/banner.png" width="30" height="30" alt="AutumnNote logo" />
        <span class="brand-name">AutumnNote</span>
      </a>
      <nav class="header-nav" aria-label="Site links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/docs.html">Docs</a>
        <a class="nav-link" href="/playground.html">Playground</a>
        <a class="nav-link" href="https://github.com/cmm-cmm/Autumn-Note" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="not-found">
    <p class="nf-code">404</p>
    <h1 class="nf-title">Page not found</h1>
    <p class="nf-sub">
      The page you're looking for doesn't exist or may have moved.
      Try the AutumnNote homepage, browse the docs, or try the live playground.
    </p>
    <div class="nf-links">
      <a href="/" class="btn btn-primary">Go to homepage</a>
      <a href="/docs.html" class="btn btn-secondary">View docs</a>
      <a href="/playground.html" class="btn btn-secondary">Open playground</a>
    </div>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">MIT License &middot; &copy; 2026 Minh Pham</span>
      <nav class="footer-links" aria-label="Footer links">
        <a href="https://github.com/cmm-cmm/Autumn-Note" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.npmjs.com/package/autumnnote" target="_blank" rel="noopener noreferrer">npm</a>
        <a href="https://github.com/cmm-cmm/Autumn-Note/issues" target="_blank" rel="noopener noreferrer">Issues</a>
      </nav>
    </div>
  </footer>
</body>
</html>
