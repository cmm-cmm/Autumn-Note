name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so SonarCloud can compute blame / new-code analysis.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: SonarCloud scan
        if: runner.os == 'Linux' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Build library
        run: pnpm build

      - name: Test framework wrappers
        run: pnpm test:wrappers

      - name: Enforce bundle budget
        run: pnpm check:bundle

      - name: Build demo site
        run: pnpm build:demo

      - name: Build framework wrappers
        run: pnpm build:wrappers

      - name: Validate package contents
        if: runner.os == 'Linux'
        run: |
          npm pack --dry-run --ignore-scripts
          npm pack ./packages/react --dry-run --ignore-scripts
          npm pack ./packages/vue --dry-run --ignore-scripts

      - name: Audit high-severity dependencies
        if: runner.os == 'Linux'
        run: pnpm audit --audit-level high

  browser:
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps ${{ matrix.browser }}
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - run: pnpm test:browser
        env:
          BROWSER: ${{ matrix.browser }}
