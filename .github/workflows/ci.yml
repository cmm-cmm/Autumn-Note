name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Build library
        run: pnpm build

      - name: Enforce bundle budget
        run: pnpm check:bundle

      - name: Test framework wrappers
        run: pnpm test:wrappers

      - name: Build demo site
        run: pnpm build:demo

      - name: Build framework wrappers
        run: pnpm build:wrappers

      - name: Validate package contents
        if: runner.os == 'Linux'
        run: |
          npm pack --dry-run --ignore-scripts
          npm pack ./packages/react --dry-run --ignore-scripts
          npm pack ./packages/vue --dry-run --ignore-scripts

      - name: Audit high-severity dependencies
        if: runner.os == 'Linux'
        run: pnpm audit --audit-level high

  browser:
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - run: pnpm test:browser
        env:
          BROWSER: ${{ matrix.browser }}
