name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: {}

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  browser-smoke:
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps ${{ matrix.browser }}
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - run: pnpm test:browser
        env:
          BROWSER: ${{ matrix.browser }}

  publish:
    needs: browser-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # Trusted publishing (OIDC) requires npm CLI 11.5.1+; Node 22's
      # bundled npm may be older, so upgrade explicitly.
      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag and package versions
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          TAG="$RELEASE_TAG_NAME"
          if [ -z "$TAG" ]; then
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VERSION="${TAG#v}"
          test "$TAG" = "v$VERSION"
          test "$(node -p "require('./package.json').version")" = "$VERSION"
          test "$(node -p "require('./packages/react/package.json').version")" = "$VERSION"
          test "$(node -p "require('./packages/vue/package.json').version")" = "$VERSION"

      - name: Run release checks
        run: pnpm check

      - name: Audit high-severity dependencies
        run: pnpm audit --audit-level high

      - name: Validate all package contents before publishing
        run: |
          npm pack --dry-run --ignore-scripts
          npm pack ./packages/react --dry-run --ignore-scripts
          npm pack ./packages/vue --dry-run --ignore-scripts

      # ──────────────────────────────────────────────────────────────
      # autumnnote (core)
      # ──────────────────────────────────────────────────────────────
      - name: Check autumnnote version
        id: core_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view autumnnote version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "npm=$NPM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish autumnnote
        if: steps.core_check.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Skip autumnnote
        if: steps.core_check.outputs.should_publish == 'false'
        run: echo "autumnnote ${{ steps.core_check.outputs.local }} already published on npm. Skipping."

      # ──────────────────────────────────────────────────────────────
      # autumnnote-react
      # ──────────────────────────────────────────────────────────────
      - name: Check autumnnote-react version
        id: react_check
        run: |
          LOCAL=$(node -p "require('./packages/react/package.json').version")
          NPM=$(npm view autumnnote-react version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Build autumnnote-react
        if: steps.react_check.outputs.should_publish == 'true'
        run: pnpm --filter autumnnote-react build

      - name: Publish autumnnote-react
        if: steps.react_check.outputs.should_publish == 'true'
        run: pnpm --filter autumnnote-react publish --access public --no-git-checks

      - name: Skip autumnnote-react
        if: steps.react_check.outputs.should_publish == 'false'
        run: echo "autumnnote-react already at current version on npm. Skipping."

      # ──────────────────────────────────────────────────────────────
      # autumnnote-vue
      # ──────────────────────────────────────────────────────────────
      - name: Check autumnnote-vue version
        id: vue_check
        run: |
          LOCAL=$(node -p "require('./packages/vue/package.json').version")
          NPM=$(npm view autumnnote-vue version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$NPM" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Build autumnnote-vue
        if: steps.vue_check.outputs.should_publish == 'true'
        run: pnpm --filter autumnnote-vue build

      - name: Publish autumnnote-vue
        if: steps.vue_check.outputs.should_publish == 'true'
        run: pnpm --filter autumnnote-vue publish --access public --no-git-checks

      - name: Skip autumnnote-vue
        if: steps.vue_check.outputs.should_publish == 'false'
        run: echo "autumnnote-vue already at current version on npm. Skipping."
